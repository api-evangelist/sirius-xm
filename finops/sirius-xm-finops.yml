description: 'FOCUS-aligned FinOps placeholder for SiriusXM: no public API pricing or self-serve
  B2B catalog; spend and meters are determined by individual partner contracts.'
sources:
  - https://www.siriusxm.com/
notes: |
  SiriusXM publishes consumer subscription pricing only. Pandora developer and AdsWizz partner APIs
  use negotiated commercial terms, so meters and FOCUS columns below are stubs.
billingModel:
  pricingCategory: Contact Sales
  billingFrequency: Per-Invoice
  billingCurrency: USD
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: Sirius XM
  ServiceCategory: Audio Streaming / Advertising
  ProviderName: Sirius XM
  PublisherName: Sirius XM Holdings Inc.
  InvoiceIssuerName: Sirius XM Holdings Inc.
  BillingCurrency: USD
meters:
  - name: contract_fees
    description: Negotiated partner / API contract fees as itemized on the SiriusXM invoice.
    unit: varies
    aggregation: sum
    dimensions:
      - contract
      - product
principles:
  - name: Visibility
    description: Request usage exports from SiriusXM Media / AdsWizz account team; no self-serve
      consumption dashboard is offered to partners.
  - name: Allocation
    description: Allocate per-contract fees to the consuming product line based on the line items
      negotiated in the partner agreement.
  - name: Optimization
    description: Renegotiation cycle is the primary lever; track delivered impressions / streams
      against the contract minimum to inform renewal terms.
  - name: Accountability
    description: Partner-relationship owner reconciles monthly invoice line items against the signed
      agreement.
maintainers:
