provider: Sirius XM
providerId: sirius-xm
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Audio
  - Streaming
  - Radio
  - Advertising
description: SiriusXM is a consumer satellite/streaming radio service with no publicly published
  developer API tiers or self-serve B2B pricing. Subsidiary product surfaces (Pandora, AdsWizz)
  are partner-gated and require direct contact for access. This artifact records a single
  contact-sales placeholder until a published pricing page is found.
sources:
  - https://www.siriusxm.com/
  - https://shop.siriusxm.com/
notes: |
  SiriusXM does not publish a public developer or partner API pricing page. Pandora/AdsWizz APIs
  are accessed under negotiated partner agreements rather than a self-serve plan catalog.
plans:
  - id: sirius-xm-contact-sales
    name: Contact Sales
    type: enterprise
    description: All access to SiriusXM, Pandora, and AdsWizz developer/partner APIs is gated to
      negotiated agreements with SiriusXM Media or AdsWizz business teams.
    entries:
      - label: Custom Negotiated Pricing
        name: custom_pricing
        type: flat
        metric: varies
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: 'contact sales'
        userMultiplied: false
    elements:
      - name: Partner / B2B Access
      - name: Negotiated Terms
maintainers:
